<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Tipster Tips Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">

    <header class="topbar">

      <div class="brand-block">
        <span class="brand-kicker">
          IA PREDICTIVA PREMIUM
        </span>

        <h1>Tipster Tips Pro</h1>

        <p class="brand-subtitle">
          Pronósticos deportivos premium con IA predictiva, picks de fútbol
        </p>
      </div>

      <div class="topbar-right">

        <div class="topbar-info">
          <div id="metaInfo" class="meta-grid"></div>
        </div>

        <div class="topbar-actions">
          <button
            id="refreshBtn"
            class="btn btn-primary"
          >
            Actualizar picks
          </button>
        </div>

      </div>

    </header>

    <section class="statusbar">

      <div
        id="loader"
        class="loader"
        style="display:none;"
      >
        Cargando...
      </div>

      <div
        id="statusText"
        class="status-text"
      >
        Inicializando modelo...
      </div>

    </section>

    <main class="dashboard-layout">

      <section class="stats-grid">

        <article class="stat-card premium">
          <span class="stat-label">
            Acierto
          </span>

          <strong id="statHits">
            --
          </strong>
        </article>

        <article class="stat-card premium">
          <span class="stat-label">
            Efectividad
          </span>

          <strong id="statEffectiveness">
            --
          </strong>
        </article>

        <article class="stat-card premium">
          <span class="stat-label">
            Modelo
          </span>

          <strong id="statProfit">
            Pro
          </strong>
        </article>

        <article class="stat-card premium">
          <span class="stat-label">
            Picks activos
          </span>

          <strong id="statPending">
            --
          </strong>
        </article>

        <article class="stat-card premium">
          <span class="stat-label">
            Picks premium
          </span>

          <strong id="countPremium">
            --
          </strong>
        </article>

        <article class="stat-card premium">
          <span class="stat-label">
            Total picks
          </span>

          <strong id="statTotalPicks">
            --
          </strong>
        </article>

      </section>

      <section id="comboOfDay"></section>

      <section id="mainContent"></section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
