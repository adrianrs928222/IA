<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Picks Pro</title>

  <meta name="description" content="Picks premium de fútbol con combinadas y análisis IA" />
  <meta name="theme-color" content="#08182f" />

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- STYLES -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- 🔝 HEADER PREMIUM -->
  <header class="header">
    <div class="header-inner">

      <div class="logo">
        <span class="logo-icon">TP</span>
        <div class="logo-text">
          <strong>Top Picks</strong>
          <small>Premium</small>
        </div>
      </div>

      <div class="status">
        <span class="status-pill live">Live</span>
        <span class="status-pill api">4 APIs</span>
        <span class="status-pill mode">Pro</span>
      </div>

    </div>
  </header>

  <!-- 🧠 HERO -->
  <section class="hero">
    <div class="hero-content">

      <h1>Top Picks Pro ⚽</h1>
      <p>
        Picks reales, combinadas del día y análisis IA en tiempo real.
      </p>

      <div class="hero-tags">
        <span>🏆 Combi del día</span>
        <span>📊 Historial</span>
        <span>🔥 Picks top</span>
        <span>⚡ Actualización automática</span>
      </div>

    </div>
  </section>

  <!-- 📦 MAIN APP -->
  <main id="app"></main>

  <!-- 🔻 FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span>⚡ Sistema premium · Multi API · Tiempo real</span>
    </div>
  </footer>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
