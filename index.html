<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Top Picks Pro Premium</title>

  <!-- Estilos básicos (puedes mejorarlos luego) -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .page-wrap {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1, h2 {
      margin: 10px 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .brand-logo {
      background: #2563eb;
      padding: 10px;
      border-radius: 10px;
      font-weight: bold;
    }

    .hero-boxes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .hero-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    .filters {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
    }

    select, button {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: black;
      cursor: pointer;
    }

    .meta-bar {
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .pick-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    .pick-main {
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 8px;
      margin-right: 5px;
      font-size: 12px;
    }

    .alta { background: #22c55e; }
    .media { background: #f59e0b; }
    .intermedia { background: #3b82f6; }

    .won { background: #22c55e; }
    .lost { background: #ef4444; }
    .pending { background: #64748b; }

    .value-box {
      margin-top: 10px;
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
    }

    .combo-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    .history-card {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .empty-box {
      text-align: center;
      opacity: 0.6;
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- AQUÍ SE MONTA TODO -->
  <div id="app"></div>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
