<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Picks Pro Premium</title>

  <meta name="description" content="Picks premium de fútbol con combinada del día, historial, confianza y análisis tipster." />
  <meta name="theme-color" content="#08182f" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="premium-header">
    <div class="premium-header__bg"></div>

    <div class="premium-header__inner">
      <div class="premium-brand">
        <div class="premium-brand__logo">TP</div>

        <div class="premium-brand__text">
          <span class="premium-brand__eyebrow">Top Picks</span>
          <h1>Pro Premium</h1>
          <p>Picks inteligentes, confianza real y análisis tipster.</p>
        </div>
      </div>

      <div class="premium-header__badges">
        <span class="premium-chip">⚽ Fútbol</span>
        <span class="premium-chip">🔥 Combi del día</span>
        <span class="premium-chip">📊 Historial</span>
        <span class="premium-chip">💎 Premium</span>
      </div>
    </div>

    <div class="premium-stats">
      <div class="premium-stat-card">
        <span class="premium-stat-card__label">Cobertura</span>
        <strong>LaLiga · Segunda · Champions</strong>
      </div>

      <div class="premium-stat-card">
        <span class="premium-stat-card__label">Modo</span>
        <strong>Tipster Pro</strong>
      </div>

      <div class="premium-stat-card">
        <span class="premium-stat-card__label">Actualización</span>
        <strong>Automática</strong>
      </div>

      <div class="premium-stat-card">
        <span class="premium-stat-card__label">Confianza</span>
        <strong>0% – 100%</strong>
      </div>
    </div>
  </header>

  <main class="premium-main">
    <div id="app"></div>
  </main>

  <footer class="premium-footer">
    <div class="premium-footer__inner">
      <span>Top Picks Pro Premium</span>
      <span>Europa/Madrid</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
